<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pathfinder</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #ffffff;
  }

  header {
    height: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 20px;
    border-bottom: 1px solid #e2e2e2;
    background: #fafafa;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #1a1a1a;
    margin-right: 8px;
  }

  .board-select {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .board-select label {
    font-size: 13px;
    color: #555;
  }

  select {
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
  }

  select:focus { outline: 2px solid #2284e6; outline-offset: 1px; }

  .status {
    margin-left: auto;
    font-size: 12px;
    color: #888;
  }

  #board-wrap {
    width: 100%;
    height: calc(100% - 56px);
    display: block;
    overflow: hidden;
  }

  canvas {
    display: block;
  }
</style>
</head>
<body>

<header>
  <h1>Pathfinder</h1>
  <div class="board-select">
    <label for="boardPicker">Board</label>
    <select id="boardPicker">
      <option value="open" selected>1 — Open field</option>
      <option value="maze">2 — True maze</option>
      <option value="unreachable">3 — Unreachable</option>
    </select>
  </div>
  <div class="status" id="status">drag the red or blue dot</div>
</header>

<div id="board-wrap">
  <canvas id="canvas"></canvas>
</div>

<script src="boards.js"></script>
<script src="grid.js"></script>
<script src="main.js"></script>
</body>
</html>
